<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 50; padding: 50; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 150px;
            border-radius: 30px;
            width: 330px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .profile-img {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            border: 4px solid #764ba2;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0 5px;
        }

        .kelas {
            margin-bottom: 15px;
        }

        .info p {
            margin: 5px 0;
        }

        .sosmed {
            margin-top: 15px;
        }

        .sosmed a {
            text-decoration: none;
            margin: 10px;
            padding: 10px 14px;
            background: #667eea;
            color: white;
            border-radius: 10px;
            display: inline-block;
            transition: 0.3s;
        }

        .sosmed a:hover {
            background: #764ba2;
        }
    </style>
</head>

<body>

<div class="card">
    <img src="foto.jpg" alt="Foto Profil" class="profile-img">

    <h1>Nofita Diana Kasih</h1>
    <p class="kelas">Kelas : XII TJKT 4</p>

    <div class="info">
        <p>🏫 SMK Komputama Majenang</p>
        <p>🎯 Cita-cita: guru</p>
        <p>🎨 Hobi: Membaca & menulis</p>
    </div>

    <div class="sosmed">
        <a href="https://instagram.com/xnz_nptaa">Instagram</a>
 </div>
</div>

</body>
</html>
